[colors]
background = #161718
foreground = #c4c8c5
alert = #fc5ef0
success = #86c38a
warning = #ffd6b1
blue = #4da3ff
blue-deep = #1a5fb4
purple = #b9b5fc
aqua = #85befd
red = #fc5ef0
disabled = #6f7377
white = #dfdfdf

[bar/bar]
width = 100%
height = 20pt
radius = 0

background = ${colors.background}
line-size = 3pt

padding-left = 1
padding-right = 2
module-margin = 2

font-0 = "HackNerdFont-Regular:size=8;2"
font-1 = "HackNerdFont-Regular:size=10;2"

modules-left = xworkspaces
modules-right = wlan eth audio-sink pulseaudio battery battery2 timer date powermenu

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; wm-restack = i3
; override-redirect = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.blue-deep}
label-active-foreground = ${colors.white}
label-active-font = 2
label-active-padding = 2

label-occupied = %name%
label-occupied-padding = 2
label-occupied-foreground = ${colors.foreground}

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.white}
label-urgent-font = 2
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 2

[module/timer]
; Countdown timer, controlled via the `t` CLI (scripts/t, on PATH as
; ~/.local/bin/t) rather than bar clicks — see polybar/timer.sh.
type = custom/script
exec = ~/.config/polybar/timer.sh
interval = 1

[module/powermenu]
type = custom/menu
expand-right = true
format-spacing = 1
label-open = ""
label-open-foreground = ${colors.alert}
label-close =  cancel
label-close-foreground = ${colors.success}
label-separator = |
label-separator-foreground = ${colors.foreground}

menu-0-0 = "Reboot "
menu-0-0-exec = menu-open-1
menu-0-0-foreground = ${colors.alert}

menu-0-1 = "Power Off"
menu-0-1-exec = menu-open-2
menu-0-1-foreground = ${colors.alert}

menu-0-2 = "Hibernate"
menu-0-2-exec = menu-open-3
menu-0-2-foreground = ${colors.warning}

menu-1-0 = "Cancel "
menu-1-0-exec = menu-open-0
menu-1-0-foreground = ${colors.success}

menu-1-1 = "Reboot"
menu-1-1-exec = systemctl reboot
menu-1-1-foreground = ${colors.alert}

menu-2-0 = "Power off"
menu-2-0-exec = systemctl poweroff
menu-2-0-foreground = ${colors.alert}

menu-2-1 = "Cancel "
menu-2-1-exec = menu-open-0
menu-2-1-foreground = ${colors.success}

menu-3-0 = "Hibernate "
menu-3-0-exec = systemctl hibernate
menu-3-0-foreground = ${colors.alert}

menu-3-1 = "Cancel"
menu-3-1-exec = menu-open-0
menu-3-1-foreground = ${colors.success}

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.purple}
format-volume = <label-volume>
label-volume = %percentage%%
format-muted = <label-muted>
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %layout%
label-layout-foreground = ${colors.warning}
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.warning}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.success}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.red}
label = %percentage:2%%

[module/wlan]
type = custom/script
exec = ~/.config/polybar/network.sh wlan
interval = 1
click-left = ~/.config/polybar/network.sh wlan toggle

[module/audio-sink]
type = custom/script
exec = ~/.config/polybar/audio-sink.sh
interval = 2
format-foreground = ${colors.purple}
click-left = pavucontrol &

[module/eth]
type = custom/script
exec = ~/.config/polybar/network.sh eth
interval = 1
click-left = ~/.config/polybar/network.sh eth toggle

[module/date]
type = internal/date
interval = 1
date = %a %b %d %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
format-prefix = "  "
format-prefix-foreground = ${colors.blue}

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
format-charging-prefix-foreground = ${colors.success}
format-discharging-prefix-foreground = ${colors.warning}
format-full-prefix-foreground = ${colors.success}

battery = BAT0
adapter = ADP1
format-charging-prefix = "󰂄 "
format-discharging-prefix = "󰁹 "
format-full-prefix = "󰁹 "
poll-interval = 5

[module/battery2]
type = internal/battery
full-at = 99
low-at = 5
format-charging-prefix-foreground = ${colors.success}
format-discharging-prefix-foreground = ${colors.warning}
format-full-prefix-foreground = ${colors.warning}

battery = BAT1
adapter = ADP1
format-charging-prefix = "󰂄 "
format-discharging-prefix = "󰁹 "
format-full-prefix = "󰁹 "
poll-interval = 5

[settings]
screenchange-reload = true

; vim:ft=dosini
